name: Build Docker images and release to Spin and GKE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/build-and-release-to-spin.yml'
      - 'Makefile'
      - '**/Dockerfile'
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      # CSS and JavaScript used to customize Swagger UI page:
      - 'nmdc_runtime/api/swagger_ui/assets/**/*.css'
      - 'nmdc_runtime/api/swagger_ui/assets/**/*.js'

env:
  # We don't want to do certain steps if this is running in a fork
  IS_ORIGINAL_REPO: ${{ github.repository == 'microbiomedata/nmdc-runtime' }}

  # Used to determine if we add the special `prod` Docker image tag
  IS_PROD_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}

  # Used when sending redeploy action requests to Rancher
  RANCHER_NAMESPACE: ${{ startsWith(github.ref, 'refs/tags/v') && 'nmdc' || 'nmdc-dev' }}

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image: [ fastapi, dagster ]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # history for all branches and tags is needed for setuptools-scm (part of build and push step)
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Generate tags and labels for the Docker container images.
      #
      # Note: The `type=sha,format=long` line makes it so every image is tagged with the Git commit hash.
      #       We do this so people can reference (i.e. pin) a specific image version, even ones not tagged
      #       with a version number via the `type=semver,pattern={{version}}` line. (The other tags may
      #       refer to different image versions over time, so they cannot be used for this purpose.)
      #
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/microbiomedata/nmdc-runtime-${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=prod,enable=${{ env.IS_PROD_RELEASE }}
            type=sha,format=long

      # Reference: https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#pushing-container-images
      # Reference: https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: ${{ env.IS_ORIGINAL_REPO }}
          file: nmdc_runtime/Dockerfile
          # Note: Since our `Dockerfile` describes multiple stages, we use the `target` option to specify a stage.
          #       Reference: https://github.com/marketplace/actions/build-and-push-docker-images#inputs
          target: ${{ matrix.image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Use the Rancher API to redeploy the specified deployments,
  # causing them to use the newly-pushed container images.
  #
  # Note: This `release` job is the Spin counterpart to the subsequently-added `restart-dev-deployments` job below.
  #       TODO: Standardize the jobs' names, if we keep this `release` job long term.
  #
  release:
    name: Restart deployments on Spin
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        deployment: [ runtime-api, dagster-dagit, dagster-daemon ]

    steps:
      - name: Redeploy ${{ env.RANCHER_NAMESPACE }}:${{ matrix.deployment }}
        if: ${{ env.IS_ORIGINAL_REPO }}
        uses: fjogeleit/http-request-action@551353b829c3646756b2ec2b3694f819d7957495 # v2.0.0
        with:
          url: ${{ secrets.RANCHER_URL }}/v3/project/${{ secrets.RANCHER_CONTEXT }}/workloads/deployment:${{ env.RANCHER_NAMESPACE }}:${{ matrix.deployment }}?action=redeploy
          method: POST
          bearerToken: ${{ secrets.RANCHER_TOKEN }}

  restart-dev-deployments:
    name: Restart (dev) deployments on GKE
    needs: [ build ]
    permissions: { contents: read }
    # Note: The `jobs.<job_id>.if` key doesn't have access to the `env` context (and, so, cannot
    #       check `env.IS_ORIGINAL_REPO` or `env.IS_PROD_RELEASE`). However, it does have access to
    #       the `github` context, so we effectively re-derive those same boolean values here.
    #
    # Docs: https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#context-availability
    #
    #   ┏━━━━━━━━━━━━━━━ IS_ORIGINAL_REPO ━━━━━━━━━━━━━━┓     ┏━━━━━━━ (not) IS_PROD_RELEASE ━━━━━━┓
    if: github.repository == 'microbiomedata/nmdc-runtime' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # Create a short-lived token that gives its holder the ability to run GHA workflows in the
      # private `microbiomedata/nmdc-cloud-deployment` repository.
      #
      # Note: This step is written under the assumption that the repository variable named
      #       `GHA_WF_DISPATCHER_GH_APP_CLIENT_ID` contains the GitHub app's client ID, and the
      #       repository secret named `GHA_WF_DISPATCHER_GH_APP_PRIVATE_KEY` contains the GitHub
      #       app's private key.
      #
      # Docs: https://github.com/marketplace/actions/create-github-app-token
      #
      - name: Create GitHub App token
        id: create-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.GHA_WF_DISPATCHER_GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GHA_WF_DISPATCHER_GH_APP_PRIVATE_KEY }}
          owner: microbiomedata
          repositories: nmdc-cloud-deployment

      # Use the GitHub CLI to trigger the GHA workflows (in the `nmdc-cloud-deployment` repo)
      # that use Argo CD to restart the Runtime (dev) and Dagster (dev) deployments.
      # Docs: https://cli.github.com/manual/gh_workflow_run
      - name: Restart Runtime deployment (dev)
        env:
          GH_TOKEN: ${{ steps.create-app-token.outputs.token }}
        run: |
          gh workflow run argocd-restart-runtime.yaml \
            --repo microbiomedata/nmdc-cloud-deployment --ref main
      - name: Restart Dagster deployment (dev)
        env:
          GH_TOKEN: ${{ steps.create-app-token.outputs.token }}
        run: |
          gh workflow run argocd-restart-dagster.yaml \
            --repo microbiomedata/nmdc-cloud-deployment --ref main
